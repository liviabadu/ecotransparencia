<div class="auth-behind-root" [class.is-leaving]="leaving()">
  <div
    class="auth-behind-dim"
    [class.is-mounted]="dimMounted()"
    aria-hidden="true"
  ></div>
  <div class="auth-behind-front" [class.is-mounted]="panelMounted()">
    @if (authMode() === 'cadastro') {
      <app-cadastro />
    } @else {
      <app-login />
    }
  </div>
</div>
