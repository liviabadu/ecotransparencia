<main class="assinaturas-page" role="presentation" (click)="onBackdropClick($event)">
  <div class="assinaturas-card" (click)="$event.stopPropagation()">
    <p class="assinaturas-badge" role="status">Em desenvolvimento</p>
    <h1 class="assinaturas-title">Assinaturas</h1>
    <p class="assinaturas-lead">
      Esta área ainda está em construção. Em breve você poderá conhecer planos, benefícios e como
      aproveitar ao máximo a EcoTransparência.
    </p>
    <p class="assinaturas-hint">
      Enquanto isso, use a busca por CNPJ na página inicial ou entre em contato se precisar de algo
      urgente.
    </p>
    <a routerLink="/" class="assinaturas-cta">Voltar ao início</a>
  </div>
</main>
