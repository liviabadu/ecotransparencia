<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <a routerLink="/" class="logo-link">
        <div class="logo-box">
          <span class="logo-text">eco</span>
          <span class="logo-sub">TRANSPARÊNCIA</span>
        </div>
      </a>
      <h1>Entrar</h1>
      <p>Acesse sua conta</p>
    </div>

    <form class="login-form" (submit)="onSubmit($event)">
      @if (errorMessage()) {
        <div class="error-message" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          [value]="email()"
          (input)="onEmailChange($any($event.target).value)"
          placeholder="seuemail@exemplo.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          [value]="password()"
          (input)="onPasswordChange($any($event.target).value)"
          placeholder="Digite sua senha"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="login-button" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="loading-spinner"></span>
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/" class="back-link">← Voltar para a página inicial</a>
    </div>
  </div>
</div>
